---
services:
  - type: web
    name: logguardian-api
    runtime: python
    pythonVersion: 3.11
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
        value: ""
      - key: SUPABASE_URL
        sync: false
        value: ""
      - key: SUPABASE_ROLE_KEY
        sync: false
        value: ""
      - key: SUPABASE_KEY
        sync: false
        value: ""
      - key: REDIS_URL
        sync: false
        value: ""

databases:
  - name: redis
    plan: free
    ipAllowList: []
